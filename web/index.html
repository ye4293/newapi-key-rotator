<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>new-api Key 轮换控制台</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f172a; color: #e2e8f0; line-height: 1.5;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 16px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab-btn {
    border: 1px solid #334155; border-radius: 8px; padding: 8px 16px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    background: #1e293b; color: #94a3b8;
  }
  .tab-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .stat { background: #0f172a; border-radius: 8px; padding: 12px; }
  .stat .label { font-size: 12px; color: #94a3b8; }
  .stat .value { font-size: 18px; font-weight: 600; margin-top: 4px; word-break: break-all; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 13px; font-weight: 600; }
  .b-on { background: #064e3b; color: #6ee7b7; }
  .b-auto { background: #7c2d12; color: #fdba74; }
  .b-freeze { background: #312e81; color: #a5b4fc; }
  .b-paused { background: #44403c; color: #d6d3d1; }
  .b-manual { background: #334155; color: #cbd5e1; }
  .b-unknown { background: #334155; color: #94a3b8; }
  textarea {
    width: 100%; min-height: 200px; padding: 12px; border-radius: 8px;
    border: 1px solid #334155; background: #0f172a; color: #e2e8f0;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; resize: vertical;
  }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
  button {
    border: none; border-radius: 8px; padding: 10px 18px; font-size: 14px; font-weight: 600;
    cursor: pointer; background: #2563eb; color: #fff;
  }
  button.secondary { background: #334155; color: #e2e8f0; }
  button:disabled { opacity: .5; cursor: default; }
  .muted { color: #94a3b8; font-size: 13px; }
  .err { color: #fca5a5; }
  .ok { color: #6ee7b7; }
  .hint { font-size: 12px; color: #94a3b8; margin-top: 6px; }
  .ch-edit { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
  .ch-edit input {
    width: 90px; padding: 4px 8px; border-radius: 6px; font-size: 14px; font-weight: 600;
    border: 1px solid #334155; background: #0f172a; color: #e2e8f0;
  }
  .ch-edit button { padding: 4px 10px; font-size: 13px; }
  .badge-custom { display:inline-block; padding:1px 6px; border-radius:999px; font-size:11px;
    background:#1e3a5f; color:#93c5fd; margin-left:4px; vertical-align:middle; }
  .label-row { display:flex; gap:6px; align-items:center; margin-bottom:16px; }
  .label-row input {
    flex:1; padding:6px 10px; border-radius:8px; font-size:14px;
    border:1px solid #334155; background:#1e293b; color:#e2e8f0;
  }
  .label-row button { padding:6px 14px; font-size:13px; }
</style>
</head>
<body>
<div id="login-overlay" style="display:none;position:fixed;inset:0;background:#0f172a;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <h2 style="margin:0;font-size:20px;color:#e2e8f0">Key 轮换控制台</h2>
  <div style="width:300px;display:flex;flex-direction:column;gap:12px">
    <input id="login-password" type="password" placeholder="输入密码" autocomplete="current-password"
      style="padding:12px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:16px;width:100%;box-sizing:border-box" />
    <button id="login-btn" style="padding:12px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-size:16px;font-weight:600;cursor:pointer">登录</button>
    <div id="login-error" style="color:#fca5a5;font-size:14px;text-align:center;min-height:20px"></div>
  </div>
</div>
<div class="wrap">
  <h1>new-api Key 轮换控制台</h1>
  <div class="tabs" id="tab-bar"></div>
  <div class="label-row" id="label-row">
    <input type="text" id="label-input" placeholder="为当前实例添加备注名…" maxlength="40" />
    <button id="btn-label-save" class="secondary">保存备注</button>
  </div>

  <div class="card">
    <div class="grid">
      <div class="stat">
        <div class="label">目标渠道</div>
        <div class="value" id="s-channel">—</div>
        <div class="ch-edit" id="ch-edit-row" style="display:none">
          <input type="number" id="ch-input" min="1" placeholder="渠道ID" />
          <button id="btn-ch-save" style="background:#16a34a">保存</button>
          <button id="btn-ch-cancel" class="secondary">取消</button>
        </div>
        <div style="margin-top:4px">
          <span class="muted" style="font-size:12px;cursor:pointer;text-decoration:underline" id="ch-edit-link">编辑</span>
          <span class="muted" style="font-size:12px;margin-left:8px;cursor:pointer;text-decoration:underline;display:none" id="ch-reset-link">重置默认</span>
        </div>
      </div>
      <div class="stat"><div class="label">当前状态</div><div class="value"><span id="s-status" class="badge b-unknown">—</span></div></div>
      <div class="stat"><div class="label">Key 进度</div><div class="value" id="s-progress">—</div></div>
      <div class="stat"><div class="label">剩余可用</div><div class="value" id="s-remaining">—</div></div>
      <div class="stat"><div class="label">已用额度</div><div class="value" id="s-used-quota">—</div></div>
      <div class="stat"><div class="label">当前使用 Key</div><div class="value" id="s-current">—</div></div>
      <div class="stat"><div class="label">最后检查</div><div class="value" id="s-checked">—</div></div>
    </div>
    <div class="row">
      <button class="secondary" id="btn-rotate" type="button">立即检查</button>
      <button id="btn-pause" type="button" class="secondary">暂停监控</button>
      <button id="btn-delete" type="button" style="background:#dc2626">删除实例</button>
      <span class="muted" id="s-action"></span>
    </div>
    <div class="row"><span class="err" id="s-error"></span></div>
  </div>

  <div class="card">
    <h1 style="font-size:16px">提交备用 Key 池</h1>
    <p class="muted">每行一个 key。自动去除空行与重复。渠道被自动禁用时会从这里依次取下一个 key 换上并启用。</p>
    <textarea id="keys" placeholder="sk-xxxxxxxx&#10;sk-yyyyyyyy&#10;sk-zzzzzzzz"></textarea>
    <div class="row">
      <button id="btn-submit" type="button">整批替换</button>
      <button id="btn-append" type="button" class="secondary">追加到末尾</button>
      <span id="submit-msg"></span>
    </div>
    <p class="hint">整批替换：清空旧池并重置进度到第一个。追加：保留已有 key 和当前进度，仅新增不重复的 key。出于安全，控制台不会回显 key 明文，仅显示数量与末 4 位。</p>
  </div>
</div>

<script>
let isAdmin = true;
let instances = [];
let activeIdx = 0;
let _token = '';
function _authHdr() { return _token ? {'Authorization': 'Basic ' + _token} : {}; }

async function apiFetch(url, options = {}) {
  options.headers = Object.assign({}, options.headers, _authHdr());
  const r = await fetch(url, options);
  if (r.status === 401) {
    showLogin();
    throw new Error('auth');
  }
  return r;
}

function showLogin() {
  document.getElementById('login-overlay').style.display = 'flex';
}

function hideLogin() {
  document.getElementById('login-overlay').style.display = 'none';
}

async function doLogin(password) {
  // 用固定用户名 "user" 拼接 Basic Auth token，服务端只校验密码
  const token = btoa('user:' + password);
  const r = await fetch('api/me', {
    headers: { 'Authorization': 'Basic ' + token, 'Accept': 'application/json' }
  });
  if (r.status === 401) {
    document.getElementById('login-error').textContent = '密码错误，请重试';
    return;
  }
  _token = token;
  document.getElementById('login-error').textContent = '';
  hideLogin();
  // 触发主界面初始化
  await initApp();
}

const statusBadge = (s, pending, paused) => {
  if (paused)  return ['已暂停', 'b-paused'];
  if (pending) return ['冻结观察中', 'b-freeze'];
  switch (s) {
    case 1: return ['启用', 'b-on'];
    case 2: return ['手动禁用', 'b-manual'];
    case 3: return ['自动禁用', 'b-auto'];
    default: return ['未知/未检查', 'b-unknown'];
  }
};

function formatQuota(q) {
  if (q == null) return '—';
  q = q / 500000;
  if (q >= 1e9) return (q / 1e9).toFixed(2) + ' B';
  if (q >= 1e6) return (q / 1e6).toFixed(2) + ' M';
  if (q >= 1e3) return (q / 1e3).toFixed(1) + ' K';
  return parseFloat(q.toFixed(2)).toString();
}

async function reloadInstances() {
  try {
    const r = await apiFetch('api/instances', { headers: { 'Accept': 'application/json' } });
    instances = await r.json();
  } catch (e) {
    instances = [];
  }
  if (instances.length > 0 && !instances.find(inst => inst.index === activeIdx)) {
    activeIdx = instances[0].index;
  }
  renderTabs();
  refresh();
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  instances.forEach((inst) => {
    const btn = document.createElement('button');
    const isActive = inst.index === activeIdx;
    btn.className = 'tab-btn' + (isActive ? ' active' : '');
    const platformTag = inst.platform ? `[${inst.platform}] ` : '';
    btn.textContent = inst.label
      ? `${platformTag}${inst.label} · #${inst.channel_id}`
      : `${platformTag}实例${inst.index} · #${inst.channel_id}`;
    btn.onclick = () => {
      activeIdx = inst.index;
      document.getElementById('label-input').value = inst.label || '';
      renderTabs();
      refresh();
    };
    bar.appendChild(btn);
  });
  // 同步备注输入框
  const cur = instances.find(inst => inst.index === activeIdx);
  document.getElementById('label-input').value = cur?.label || '';
}

async function refresh() {
  const idx = activeIdx;
  try {
    const r = await apiFetch(`api/instance/${idx}/status`, { headers: { 'Accept': 'application/json' } });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const chLabel = '#' + d.channel_id + (d.is_custom_channel ? '<span class="badge-custom">自定义</span>' : '');
    document.getElementById('s-channel').innerHTML = chLabel;
    document.getElementById('ch-reset-link').style.display = d.is_custom_channel ? 'inline' : 'none';
    const [text, cls] = statusBadge(d.last_status, d.pending_rotation, d.paused);
    const badge = document.getElementById('s-status');
    badge.textContent = text;
    badge.className = 'badge ' + cls;
    const p = d.pool || {};
    document.getElementById('s-progress').textContent = (p.index || 0) + ' / ' + (p.total || 0) + (p.exhausted ? ' (已用尽)' : '');
    document.getElementById('s-remaining').textContent = (p.remaining || 0);
    document.getElementById('s-used-quota').textContent = d.channel_used_quota != null ? formatQuota(d.channel_used_quota) : '—';
    document.getElementById('s-current').textContent = p.current_key || '—';
    document.getElementById('s-checked').textContent = d.last_checked ? new Date(d.last_checked).toLocaleString() : '—';
    document.getElementById('s-action').textContent = d.last_action ? ('最近动作：' + d.last_action) : '';
    document.getElementById('s-error').textContent = d.last_error ? ('错误：' + d.last_error) : '';
    const pauseBtn = document.getElementById('btn-pause');
    pauseBtn.textContent = d.paused ? '恢复监控' : '暂停监控';
  } catch (e) {
    document.getElementById('s-error').textContent = '无法获取状态：' + e.message;
  }
}

async function submitKeys() {
  const btn = document.getElementById('btn-submit');
  const msg = document.getElementById('submit-msg');
  const keys = document.getElementById('keys').value;
  btn.disabled = true; msg.textContent = '保存中…'; msg.className = 'muted';
  try {
    const r = await apiFetch(`api/instance/${activeIdx}/keys`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keys })
    });
    const d = await r.json();
    if (!r.ok || !d.success) throw new Error(d.message || ('HTTP ' + r.status));
    msg.textContent = '已替换，共 ' + d.count + ' 个 key，进度已重置。';
    msg.className = 'ok';
    document.getElementById('keys').value = '';
    refresh();
  } catch (e) {
    msg.textContent = '保存失败：' + e.message;
    msg.className = 'err';
  } finally {
    btn.disabled = false;
  }
}

async function appendKeys() {
  const btn = document.getElementById('btn-append');
  const msg = document.getElementById('submit-msg');
  const keys = document.getElementById('keys').value;
  btn.disabled = true; msg.textContent = '追加中…'; msg.className = 'muted';
  try {
    const r = await apiFetch(`api/instance/${activeIdx}/keys/append`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keys })
    });
    const d = await r.json();
    if (!r.ok || !d.success) throw new Error(d.message || ('HTTP ' + r.status));
    msg.textContent = '已追加 ' + d.added + ' 个新 key（重复已跳过）。';
    msg.className = 'ok';
    document.getElementById('keys').value = '';
    refresh();
  } catch (e) {
    msg.textContent = '追加失败：' + e.message;
    msg.className = 'err';
  } finally {
    btn.disabled = false;
  }
}

async function rotateNow() {
  const btn = document.getElementById('btn-rotate');
  btn.disabled = true;
  try { await apiFetch(`api/instance/${activeIdx}/rotate-now`, { method: 'POST' }); } catch (e) {}
  setTimeout(() => { refresh(); btn.disabled = false; }, 800);
}

document.getElementById('btn-submit').addEventListener('click', submitKeys);
document.getElementById('btn-append').addEventListener('click', appendKeys);
document.getElementById('btn-rotate').addEventListener('click', rotateNow);

document.getElementById('btn-delete').addEventListener('click', async () => {
  const cur = instances.find(inst => inst.index === activeIdx);
  if (!confirm(`确认删除实例${activeIdx}（渠道 #${cur?.channel_id}）？`)) return;
  const r = await apiFetch(`api/instance/${activeIdx}/delete`, { method: 'POST' }).then(r => r.json()).catch(() => ({}));
  if (r.success) { await reloadInstances(); }
  else alert('删除失败：' + (r.message || '未知错误'));
});

document.getElementById('btn-label-save').addEventListener('click', async () => {
  const label = document.getElementById('label-input').value.trim();
  await apiFetch(`api/instance/${activeIdx}/label`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ label })
  });
  await reloadInstances();
});

document.getElementById('btn-pause').addEventListener('click', async () => {
  const st = await apiFetch(`api/instance/${activeIdx}/status`, { headers: { 'Accept': 'application/json' } })
    .then(r => r.json()).catch(() => ({}));
  const endpoint = st.paused ? 'resume' : 'pause';
  await apiFetch(`api/instance/${activeIdx}/${endpoint}`, { method: 'POST' }).catch(() => {});
  setTimeout(refresh, 300);
});

document.getElementById('ch-edit-link').addEventListener('click', () => {
  document.getElementById('ch-edit-row').style.display = 'flex';
  document.getElementById('ch-edit-link').style.display = 'none';
});
document.getElementById('btn-ch-cancel').addEventListener('click', () => {
  document.getElementById('ch-edit-row').style.display = 'none';
  document.getElementById('ch-edit-link').style.display = 'inline';
  document.getElementById('ch-input').value = '';
});
document.getElementById('btn-ch-save').addEventListener('click', async () => {
  const val = parseInt(document.getElementById('ch-input').value, 10);
  if (!val || val <= 0) return;
  await apiFetch(`api/instance/${activeIdx}/channel-id`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ channel_id: val })
  });
  document.getElementById('ch-edit-row').style.display = 'none';
  document.getElementById('ch-edit-link').style.display = 'inline';
  document.getElementById('ch-input').value = '';
  refresh();
});
document.getElementById('ch-reset-link').addEventListener('click', async () => {
  await apiFetch(`api/instance/${activeIdx}/channel-id`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ channel_id: 0 })
  });
  refresh();
});

async function initApp() {
  try {
    const r = await apiFetch('api/me', { headers: { 'Accept': 'application/json' } });
    const me = await r.json();
    isAdmin = me.is_admin;
  } catch(e) {
    return; // auth 失败，showLogin 已被 apiFetch 调用
  }

  if (!isAdmin) {
    document.getElementById('btn-rotate').style.display = 'none';
    document.getElementById('btn-pause').style.display = 'none';
    document.getElementById('btn-delete').style.display = 'none';
    document.getElementById('label-row').style.display = 'none';
    document.getElementById('ch-edit-link').style.display = 'none';
  }

  await reloadInstances();
  setInterval(() => refresh(), 5000);
}

// 登录按钮和回车键
document.getElementById('login-btn').addEventListener('click', () => {
  doLogin(document.getElementById('login-password').value);
});
document.getElementById('login-password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin(document.getElementById('login-password').value);
});

// 页面启动：先尝试无凭据调用，若 401 则显示登录框
(async () => {
  const r = await fetch('api/me', { headers: { 'Accept': 'application/json' } });
  if (r.status === 401) {
    showLogin();
    return;
  }
  // WEB_PASSWORD 为空（无保护模式），直接进入主界面
  _token = '';
  const me = await r.json();
  isAdmin = me.is_admin;
  if (!isAdmin) {
    document.getElementById('btn-rotate').style.display = 'none';
    document.getElementById('btn-pause').style.display = 'none';
    document.getElementById('btn-delete').style.display = 'none';
    document.getElementById('label-row').style.display = 'none';
    document.getElementById('ch-edit-link').style.display = 'none';
  }
  await reloadInstances();
  setInterval(() => refresh(), 5000);
})();
</script>
</body>
</html>
